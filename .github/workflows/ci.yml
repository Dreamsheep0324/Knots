# CI — 持续集成
# 每次 push 到 main 或 PR 时自动运行编译 + 单元测试
# 全绿才能合并，防止回归

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支新 push 时取消旧 run，节省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 编译 + 单元测试
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Gradle 缓存加速后续构建
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 编译检查
        run: ./gradlew compileDebugKotlin --no-daemon

      - name: 单元测试
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: 上传测试报告
        if: always()  # 即使测试失败也上传报告
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            "**/build/reports/tests/"
            "**/build/test-results/"
          retention-days: 7
