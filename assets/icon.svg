<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 108 108">
  <!-- 白色背景 -->
  <rect width="108" height="108" fill="#FFFFFF" rx="24"/>

  <!-- 光晕背景 -->
  <circle cx="54" cy="54" r="14" fill="#DC2626" fill-opacity="0.1"/>

  <!-- 中心光晕 -->
  <circle cx="54" cy="54" r="10" fill="#DC2626" fill-opacity="0.18"/>

  <!-- 外圈光晕 -->
  <circle cx="54" cy="54" r="7" fill="#DC2626" fill-opacity="0.08"/>

  <!-- 弧线1: 黑色 (右半圆) -->
  <path d="M 54,26 A 28,28 0 0,1 54,82" fill="none" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round"/>

  <!-- 弧线2: 赤红 (左半圆) -->
  <path d="M 54,82 A 28,28 0 0,1 54,26" fill="none" stroke="#DC2626" stroke-width="4.5" stroke-linecap="round"/>

  <!-- 中心圆 -->
  <circle cx="54" cy="54" r="4" fill="#DC2626"/>

  <!-- 顶部端点 -->
  <circle cx="54" cy="26" r="2" fill="#1A1A1A" fill-opacity="0.6"/>

  <!-- 底部端点 -->
  <circle cx="54" cy="82" r="2" fill="#DC2626" fill-opacity="0.6"/>
</svg>
